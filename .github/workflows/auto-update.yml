name: Auto Update API Lines

on:
  schedule:
    # 每8小时检查一次（错峰，:47分）
    - cron: '47 */8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Run auto-update script
        run: python scripts/update.py

      - name: Check for changes
        id: changes
        run: |
          count=$(git status --porcelain | wc -l)
          echo "has_changes=$count" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.changes.outputs.has_changes != '0'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git pull --rebase --autostash
          git add api-lines.js api-lines.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🔄 自动更新 API 线路 $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
