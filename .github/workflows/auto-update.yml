name: Auto Update API Lines

on:
  schedule:
    # 每8小时检查一次（错峰，:47分）
    - cron: '47 */8 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('scripts/update.py') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Run auto-update script
        run: python scripts/update.py
        timeout-minutes: 5

      - name: Check for changes
        id: changes
        run: |
          count=$(git status --porcelain | wc -l)
          echo "has_changes=$count" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.changes.outputs.has_changes != '0'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git pull --rebase --autostash
          git add api-lines.js api-lines.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🔄 自动更新 API 线路 $(date +'%Y-%m-%d %H:%M')"
            git push
          fi

      # ── Deploy to GitHub Pages ──
      # 自动更新有变更时部署，手动触发总是部署
      - name: Determine if deploy needed
        id: deploy_check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          elif [ "${{ steps.changes.outputs.has_changes }}" != "0" ]; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          else
            echo "should_deploy=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Pages
        if: steps.deploy_check.outputs.should_deploy == 'true'
        uses: actions/configure-pages@v5

      - name: Prepare deploy directory
        if: steps.deploy_check.outputs.should_deploy == 'true'
        run: |
          mkdir -p _site
          cp vip-player.html _site/index.html
          cp api-lines.js _site/
          cp vip-player.ico _site/ 2>/dev/null || true
          # Integrity check
          if [ ! -s _site/index.html ]; then echo "ERROR: index.html missing or empty"; exit 1; fi
          if [ ! -s _site/api-lines.js ]; then echo "ERROR: api-lines.js missing or empty"; exit 1; fi
          echo "✓ Deploy directory OK ($(wc -c < _site/index.html) bytes index, $(wc -c < _site/api-lines.js) bytes api-lines)"

      - name: Upload Pages artifact
        if: steps.deploy_check.outputs.should_deploy == 'true'
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        if: steps.deploy_check.outputs.should_deploy == 'true'
        uses: actions/deploy-pages@v4
